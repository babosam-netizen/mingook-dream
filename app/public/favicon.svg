<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <!-- 전통적이며 현대적인 색감의 그라데이션 -->
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF4D4D" />
      <stop offset="100%" stop-color="#CD2E3A" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#448AFF" />
      <stop offset="100%" stop-color="#0047A0" />
    </linearGradient>
    <!-- 입체감을 위한 필터 -->
    <filter id="subtleShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.5" />
      <feOffset dx="0.5" dy="0.5" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- 태극기의 각도에 맞게 회전 (-33.69도) -->
  <g transform="rotate(-33.69 16 16)" filter="url(#subtleShadow)">
    <!-- 파란색 하단 (음) -->
    <path d="M 1 16 A 15 15 0 0 0 31 16 A 7.5 7.5 0 0 0 16 16 A 7.5 7.5 0 0 1 1 16" fill="url(#blueGrad)" />
    <!-- 빨간색 상단 (양) -->
    <path d="M 1 16 A 15 15 0 0 1 31 16 A 7.5 7.5 0 0 1 16 16 A 7.5 7.5 0 0 0 1 16" fill="url(#redGrad)" />
  </g>
</svg>