<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>QuickPanel 패턴 A — 체크리스트형</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Apple SD Gothic Neo", "Pretendard", sans-serif;
    background: #f8fafc;
    margin: 0;
    padding: 24px;
    color: #1e293b;
  }
  .label {
    max-width: 720px;
    margin: 0 auto 12px;
    font-size: 13px;
    color: #64748b;
  }
  .panel {
    max-width: 720px;
    margin: 0 auto;
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .header {
    padding: 14px 18px;
    background: linear-gradient(90deg, #4f46e5, #6366f1);
    color: #fff;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .header h2 {
    margin: 0;
    font-size: 15px;
    font-weight: 700;
  }
  .progress-text {
    font-size: 12px;
    background: rgba(255,255,255,0.2);
    padding: 4px 10px;
    border-radius: 999px;
  }
  .stages {
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .stage {
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    padding: 12px 14px;
    background: #f8fafc;
    transition: all .2s;
  }
  .stage.done {
    background: #ecfdf5;
    border-color: #a7f3d0;
  }
  .stage.current {
    background: #eef2ff;
    border-color: #6366f1;
    border-width: 2px;
    padding: 14px;
    box-shadow: 0 2px 10px rgba(99,102,241,0.15);
  }
  .stage.future {
    background: #f1f5f9;
    border-color: #e2e8f0;
    opacity: 0.7;
  }
  .stage-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .stage-title {
    font-weight: 700;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .stage.done .stage-title { color: #047857; }
  .stage.current .stage-title { color: #4338ca; font-size: 15px; }
  .stage.future .stage-title { color: #94a3b8; }
  .stage-num {
    display: inline-flex;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: #cbd5e1;
    color: #fff;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 800;
  }
  .stage.done .stage-num { background: #10b981; }
  .stage.current .stage-num { background: #6366f1; box-shadow: 0 0 0 3px #c7d2fe; }
  .session-tag {
    font-size: 11px;
    background: #f1f5f9;
    padding: 3px 8px;
    border-radius: 999px;
    color: #64748b;
    font-family: monospace;
  }
  .stage.current .session-tag { background: #ddd6fe; color: #5b21b6; font-weight: 700; }
  .stage-summary {
    margin-top: 6px;
    font-size: 12px;
    color: #64748b;
    padding-left: 30px;
  }
  .stage.done .stage-summary { color: #047857; }
  .action-box {
    margin-top: 12px;
    background: #fff;
    border: 1px dashed #6366f1;
    border-radius: 8px;
    padding: 12px;
  }
  .action-label {
    font-size: 11px;
    font-weight: 800;
    color: #6366f1;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .action-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .action-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #6366f1;
    color: #fff;
    border: none;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all .15s;
    font-family: inherit;
    text-align: left;
  }
  .action-btn:hover { background: #4f46e5; transform: translateY(-1px); }
  .action-btn.secondary {
    background: #fff;
    color: #4338ca;
    border: 1px solid #c7d2fe;
  }
  .action-btn.secondary:hover { background: #eef2ff; }
  .action-btn .num {
    background: rgba(255,255,255,0.25);
    width: 18px; height: 18px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 800;
  }
  .action-btn.secondary .num {
    background: #c7d2fe;
    color: #4338ca;
  }
  .nav-row {
    margin-top: 14px;
    display: flex;
    justify-content: space-between;
    gap: 8px;
  }
  .nav-btn {
    flex: 1;
    padding: 8px 10px;
    background: #fff;
    border: 1px solid #cbd5e1;
    border-radius: 8px;
    font-size: 12px;
    color: #475569;
    cursor: pointer;
    font-family: inherit;
  }
  .nav-btn:hover { background: #f1f5f9; }
  .stage.future .stage-summary::before {
    content: "다음: ";
    color: #94a3b8;
    font-weight: 700;
  }
</style>
</head>
<body>

<div class="label">📋 QuickPanel 패턴 A — 체크리스트형 (5단계 세로, 현재 단계만 펼쳐짐)</div>

<div class="panel">

  <!-- 헤더 -->
  <div class="header">
    <h2>🏛️ 입법부 라운드</h2>
    <div class="progress-text">진행 2/5</div>
  </div>

  <!-- 5단계 카드 세로 -->
  <div class="stages">

    <!-- ① 발의 완료 -->
    <div class="stage done">
      <div class="stage-head">
        <div class="stage-title">
          <span class="stage-num">✓</span>
          ① 법안 발의
        </div>
        <span class="session-tag">10차시</span>
      </div>
      <div class="stage-summary">모든 모둠 발의 완료 (8/8)</div>
    </div>

    <!-- ② 토의 완료 -->
    <div class="stage done">
      <div class="stage-head">
        <div class="stage-title">
          <span class="stage-num">✓</span>
          ② 온라인 토의
        </div>
        <span class="session-tag">11차시</span>
      </div>
      <div class="stage-summary">1등 법안: <b>"플라스틱 쓰레기 줄이기 법안"</b> (4.7/5점)</div>
    </div>

    <!-- ③ 상정+토론 현재 -->
    <div class="stage current">
      <div class="stage-head">
        <div class="stage-title">
          <span class="stage-num">▶</span>
          ③ 법안 상정 및 토론
        </div>
        <span class="session-tag">11차시 · 현재</span>
      </div>
      <div class="stage-summary">1등 법안을 정식 상정하고 오프라인 토론을 진행합니다.</div>

      <div class="action-box">
        <div class="action-label">💡 지금 할 일</div>
        <div class="action-row">
          <button class="action-btn">
            <span class="num">1</span>
            ✓ 1등 법안 정식 상정
          </button>
          <button class="action-btn secondary">
            <span class="num">2</span>
            🎙️ 오프라인 토론 시작 (토론 도구 띄우기)
          </button>
          <button class="action-btn secondary">
            <span class="num">3</span>
            🎬 전광판 띄우기 → 표결 단계로 이동
          </button>
        </div>
      </div>

      <div class="nav-row">
        <button class="nav-btn">◀ 이전 단계 (② 토의)</button>
        <button class="nav-btn">다음 단계 (④ 표결) ▶</button>
      </div>
    </div>

    <!-- ④ 표결 대기 -->
    <div class="stage future">
      <div class="stage-head">
        <div class="stage-title">
          <span class="stage-num">4</span>
          ④ 본회의 표결
        </div>
        <span class="session-tag">12차시</span>
      </div>
      <div class="stage-summary">전광판 활성화 후 학생 표결 → [표결 마감]</div>
    </div>

    <!-- ⑤ 종료 대기 -->
    <div class="stage future">
      <div class="stage-head">
        <div class="stage-title">
          <span class="stage-num">5</span>
          ⑤ 의결 종료
        </div>
        <span class="session-tag">12차시</span>
      </div>
      <div class="stage-summary">가결/부결 결과 발표</div>
    </div>

  </div>
</div>

</body>
</html>
